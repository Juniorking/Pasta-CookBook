<style>
:root {

  --semolina-deep: #ecdcb4;

  --ink: #2a2017;
  --ink-soft: #6a5c47;
  --tomato: #c23b22;

* { box-sizing: border-box; margin: 0; padding: 0; }
body {

}
.hero h1 {

}
.hero h1 .accent { font-family: "Fraunces", serif; font-style: italic; font-weight: 600; color: var(--tomato); }
.lede { margin: 1rem auto 2rem; max-width: 32rem; color: var(--ink-soft); font-size: 1.02rem; }
.searchbar {

.search-icon { width: 20px; height: 20px; flex-shrink: 0; fill: none; stroke: var(--ink-soft); stroke-width: 2; stroke-linecap: round; }

.container { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

.filter-group { flex: 1; min-width: 240px; }

.chip {

.chip.active { background: var(--tomato); border-color: var(--tomato); color: #fff; }
.chip .chip-icon { width: 18px; height: 18px; }
.result-count { margin: 1.8rem 0 1.2rem; font-size: 0.9rem; color: var(--ink-soft); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.2rem; }
.card {

.card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px var(--shadow); }
.card-it { font-family: "Fraunces", serif; font-style: italic; color: var(--tomato); font-size: 0.92rem; margin-bottom: 0.15rem; }

.card-meta span { display: inline-flex; align-items: center; gap: 0.25rem; }

.modal { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1.2rem; }

.tip { margin-top: 1.4rem; background: rgba(90, 107, 54, 0.1); border-left: 3px solid var(--basil); border-radius: 0 8px 8px 0; padding: 0.8rem 1rem; font-size: 0.9rem; color: var(--ink); }

@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

</style>
</head>

const state = { type: null, noodle: null, q: "" };
const $ = (sel) => document.querySelector(sel);
const grid = $("#recipe-grid"), emptyState = $("#empty-state"), resultCount = $("#result-count");

// 면 종류별 손그림 아이콘 (시그니처)
const noodleIcon = (noodle) => {
  const s = 'fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"';
  const shapes = {
    스파게티: `<line x1="5" y1="3" x2="5" y2="15" ${s}/><line x1="9" y1="3" x2="9" y2="15" ${s}/><line x1="13" y1="3" x2="13" y2="15" ${s}/>`,
    링귀네: `<path d="M5 3 v12 M9 3 v12 M13 3 v12" ${s} stroke-width="2.4"/>`,
    페투치네: `<rect x="4" y="3" width="2.5" height="12" ${s}/><rect x="8" y="3" width="2.5" height="12" ${s}/><rect x="12" y="3" width="2.5" height="12" ${s}/>`,
    탈리아텔레: `<path d="M4 4 q2 3 0 6 q-2 3 0 5 M9 4 q2 3 0 6 q-2 3 0 5 M14 4 q2 3 0 6 q-2 3 0 5" ${s}/>`,
    펜네: `<path d="M5 13 L8 4 L14 6 L11 15 Z" ${s}/>`,
    부카티니: `<line x1="6" y1="3" x2="6" y2="15" ${s} stroke-width="3"/><line x1="11" y1="3" x2="11" y2="15" ${s} stroke-width="3"/>`,
    트로피에: `<path d="M5 12 q3 -8 6 -4 q3 4 0 6" ${s}/>`,
  };
  return `<svg class="chip-icon" viewBox="0 0 18 18" aria-hidden="true">${shapes[noodle] || `<circle cx="9" cy="9" r="5" ${s}/>`}</svg>`;
};

// 검색·필터 (서버 대신 메모리에서 직접)
function filterRecipes() {
  let r = RECIPES;
  if (state.type) r = r.filter((x) => x.type === state.type);
  if (state.noodle) r = r.filter((x) => x.noodle === state.noodle);
  if (state.q) {
    const term = state.q.trim().toLowerCase();
    r = r.filter((x) => [x.name, x.nameIt, x.type, x.noodle, x.summary, ...(x.tags || []), ...x.ingredients.map((i) => i.name)]
      .join(" ").toLowerCase().includes(term));
  }
  return r;
}

function renderChips(containerId, key, values) {
  const c = $(containerId);
  c.innerHTML = "";
  values.forEach((value) => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.value = value;
    btn.innerHTML = key === "noodle" ? noodleIcon(value) + `<span>${value}</span>` : `<span>${value}</span>`;
    btn.addEventListener("click", () => {
      state[key] = state[key] === value ? null : value; // 토글
      syncChips(containerId, key);
      render();
    });
    c.appendChild(btn);
  });
}
function syncChips(containerId, key) {
  $(containerId).querySelectorAll(".chip").forEach((c) => c.classList.toggle("active", c.dataset.value === state[key]));
}

function render() {
  const list = filterRecipes();
  emptyState.hidden = list.length > 0;
  resultCount.innerHTML = `총 <b>${list.length}</b>개의 레시피`;
  grid.innerHTML = list.map((r) => `
    <button class="card" data-id="${r.id}">
      <span class="badge">${r.type}</span>
      <div class="card-it">${r.nameIt}</div>
      <div class="card-name">${r.name}</div>
      <p class="card-summary">${r.summary}</p>
      <div class="card-meta"><span>🍝 ${r.noodle}</span><span>⏱ ${r.time}분</span><span>📊 ${r.difficulty}</span></div>
    </button>`).join("");
  grid.querySelectorAll(".card").forEach((card) => card.addEventListener("click", () => openRecipe(card.dataset.id)));
}

function openRecipe(id) {
  const r = RECIPES.find((x) => x.id === id);
  if (!r) return;
  $("#modal-body").innerHTML = `
    <div class="modal-it">${r.nameIt}</div>
    <h2 class="modal-title" id="modal-title">${r.name}</h2>
    <p class="modal-summary">${r.summary}</p>
    <div class="modal-meta">
      <span class="meta-pill">${r.type}</span><span class="meta-pill">🍝 ${r.noodle}</span>
      <span class="meta-pill">⏱ ${r.time}분</span><span class="meta-pill">📊 ${r.difficulty}</span>
      <span class="meta-pill">👥 ${r.servings}인분</span>
    </div>
    <h3 class="section-head">재료</h3>
    <ul class="ingredients">${r.ingredients.map((i) => `<li><span>${i.name}</span><span class="amount">${i.amount}</span></li>`).join("")}</ul>
    <h3 class="section-head">만드는 순서</h3>
    <ol class="steps">${r.steps.map((s) => `<li>${s}</li>`).join("")}</ol>
    <div class="tip"><b>핵심 팁 ·</b> ${r.tip}</div>
    ${r.videos && r.videos.length ? `<h3 class="section-head">레시피 영상</h3>
    <ul class="videos">${r.videos.map((v) => `<li><a href="${v.url}" target="_blank" rel="noopener">▶ ${v.title}</a></li>`).join("")}</ul>` : ""}`;
  $("#modal").hidden = false;
  document.body.style.overflow = "hidden";
}
function closeModal() { $("#modal").hidden = true; document.body.style.overflow = ""; }

// 검색 입력 (디바운스)
let timer;
$("#search").addEventListener("input", (e) => {
  const v = e.target.value;
  $("#clear-search").hidden = v.length === 0;
  clearTimeout(timer);
  timer = setTimeout(() => { state.q = v; render(); }, 200);
});
$("#clear-search").addEventListener("click", () => {
  $("#search").value = ""; $("#clear-search").hidden = true; state.q = ""; render();
});

document.querySelectorAll("[data-close]").forEach((el) => el.addEventListener("click", closeModal));
document.addEventListener("keydown", (e) => { if (e.key === "Escape" && !$("#modal").hidden) closeModal(); });

// 초기화 (데이터에서 종류·면 목록을 자동 추출)
renderChips("#type-filters", "type", [...new Set(RECIPES.map((r) => r.type))]);
renderChips("#noodle-filters", "noodle", [...new Set(RECIPES.map((r) => r.noodle))]);
render();
</script>
</body>
</html>
